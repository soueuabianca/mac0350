<div id="lista-tarefas">
    {% for tarefa in tarefas %}
    <div class="tarefa-card">
        <h3>{{ tarefa.titulo }}</h3>
        <p>Tipo: {{ tarefa.tipo }} | Prioridade: {{ tarefa.prioridade }}</p>
        
        <button class="btn-deletar"
                hx-delete="/tarefas?id={{ tarefa.id }}" 
                hx-target="#lista-tarefas" 
                hx-swap="outerHTML"
                hx-confirm="Concluir esta tarefa?">🐾</button>
    </div>
    {% else %}
    <p style="text-align: center; font-style: italic;">Nenhuma tarefa encontrada.</p>
    {% endfor %}

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
        {% if pagina > 1 %}
        <button hx-get="/?busca={{ busca }}&tipo_busca={{ tipo_busca }}&prioridade_busca={{ prioridade_busca }}&pagina={{ pagina - 1 }}" 
                hx-target="#lista-tarefas" 
                hx-swap="outerHTML">Anterior</button>
        {% else %}
        <div style="width: 80px;"></div>
        {% endif %}
        
        <span>Página {{ pagina }} de {{ total_paginas }}</span>
        
        {% if tem_mais %}
        <button hx-get="/?busca={{ busca }}&tipo_busca={{ tipo_busca }}&prioridade_busca={{ prioridade_busca }}&pagina={{ pagina + 1 }}" 
                hx-target="#lista-tarefas" 
                hx-swap="outerHTML">Próxima</button>
        {% else %}
        <div style="width: 80px;"></div>
        {% endif %}
    </div>
</div>
